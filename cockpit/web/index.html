<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>griff · cockpit</title>
    <style>
      html, body { margin: 0; height: 100%; background: #1b1b1f; }
      body { overflow: hidden; }
      /* eframe's resize observer drives the framebuffer; CSS fills the viewport. */
      canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
      #loading {
        position: absolute; inset: 0; display: grid; place-items: center;
        color: #9a9aa2; font: 14px system-ui, sans-serif;
      }
      /* A small file-open affordance over the canvas — opens the OS file picker
         (phone-friendly) and hands the bytes to the wasm via load_score. */
      #open {
        position: absolute; z-index: 1; top: 8px; left: 8px;
        padding: 4px 10px; border-radius: 6px; cursor: pointer; user-select: none;
        background: #2a2a30cc; color: #d6d6dd; font: 15px system-ui, sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="loading">loading the cockpit…</div>
    <label id="open" title="open a MIDI or Guitar Pro file">📂 Open<input
        id="file" type="file" accept=".mid,.gp3,.gp4,.gp5,.gpx" hidden /></label>
    <canvas id="cockpit"></canvas>
    <script type="module">
      // `wasm-bindgen --target web` emits griff_cockpit.js (the loader) and the
      // wasm; boot the egui app on the canvas and wire the file picker into the
      // wasm `load_score` export (ADR-0027 Slices 2–3).
      import init, { start, load_score } from "./griff_cockpit.js";
      init()
        .then(() => {
          document.getElementById("loading").remove();
          start(document.getElementById("cockpit"));
          document.getElementById("file").addEventListener("change", async (event) => {
            const file = event.target.files[0];
            if (file) load_score(file.name, new Uint8Array(await file.arrayBuffer()));
          });
        })
        .catch((err) => {
          document.getElementById("loading").textContent =
            "failed to load the cockpit — see the console";
          console.error(err);
        });
    </script>
  </body>
</html>
