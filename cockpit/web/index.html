<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>griff · cockpit</title>
    <style>
      html, body { margin: 0; height: 100%; background: #1b1b1f; }
      body { overflow: hidden; }
      /* eframe's resize observer drives the framebuffer; CSS fills the viewport. */
      canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
      #loading {
        position: absolute; inset: 0; display: grid; place-items: center;
        color: #9a9aa2; font: 14px system-ui, sans-serif;
      }
      /* File / OPFS actions (open a file, capture, corpus, manifest), sitting
         just below the egui toolbar (track selector + play) drawn in the canvas. */
      #bar { position: absolute; z-index: 1; top: 44px; left: 8px; display: flex; gap: 6px; }
      #bar > * {
        padding: 4px 10px; border: 0; border-radius: 6px; cursor: pointer; user-select: none;
        background: #2a2a30cc; color: #d6d6dd; font: 15px system-ui, sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="loading">loading the cockpit…</div>
    <div id="bar">
      <label id="open" title="open a MIDI or Guitar Pro file">📂 Open<input
          id="file" type="file" accept=".mid,.gp3,.gp4,.gp5,.gpx" hidden /></label>
      <button id="capture" title="capture the focused track as chunk.json">⤓ Capture</button>
      <button id="corpus" title="browse the OPFS corpus in the dock">📚 Corpus</button>
      <button id="manifest" title="fold the OPFS corpus into a manifest.json">📦 Manifest</button>
    </div>
    <canvas id="cockpit"></canvas>
    <script type="module">
      // `wasm-bindgen --target web` emits griff_cockpit.js (the loader) and the
      // wasm; boot the egui app on the canvas and wire the toolbar to the wasm
      // exports (ADR-0027 Slices 2–4).
      import init, { start, load_score, request_capture, build_manifest_json, load_corpus }
        from "./griff_cockpit.js";

      function download(name, text) {
        const url = URL.createObjectURL(new Blob([text], { type: "application/json" }));
        const a = document.createElement("a");
        a.href = url;
        a.download = name;
        a.click();
        URL.revokeObjectURL(url);
      }

      // Gather every chunk.json's text from the OPFS corpus tree (the schema
      // lives in Rust; JS just walks the directory and hands over the bytes).
      async function readCorpus() {
        const texts = [];
        try {
          const root = await navigator.storage.getDirectory();
          const corpus = await root.getDirectoryHandle("corpus");
          for await (const [name, handle] of corpus.entries()) {
            if (name.endsWith(".chunk.json")) texts.push(await (await handle.getFile()).text());
          }
        } catch (_) {
          /* no corpus yet */
        }
        return texts;
      }

      // Hand the corpus to the egui dock (ADR-0027 Slice 5) — browse/filter there.
      async function openCorpus() {
        try {
          load_corpus(await readCorpus());
        } catch (err) {
          console.error("corpus load failed:", err);
        }
      }

      // Fold the corpus, in-wasm, into a manifest and download it.
      async function buildManifest() {
        try {
          download("manifest.json", build_manifest_json(await readCorpus()));
        } catch (err) {
          console.error("manifest failed:", err);
        }
      }

      const loading = document.getElementById("loading");
      init()
        .then(() => {
          // Boot first, then drop the overlay — so a `start` failure still has
          // `#loading` to show the error in the catch below (#98 review).
          start(document.getElementById("cockpit"));
          loading.remove();
          document.getElementById("file").addEventListener("change", async (event) => {
            const file = event.target.files[0];
            if (file) load_score(file.name, new Uint8Array(await file.arrayBuffer()));
          });
          document.getElementById("capture").addEventListener("click", () => request_capture());
          document.getElementById("corpus").addEventListener("click", openCorpus);
          document.getElementById("manifest").addEventListener("click", buildManifest);
        })
        .catch((err) => {
          loading.textContent = "failed to load the cockpit — see the console";
          console.error(err);
        });
    </script>
  </body>
</html>
