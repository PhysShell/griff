<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>griff · cockpit</title>
    <style>
      html, body { margin: 0; height: 100%; background: #1b1b1f; }
      body { overflow: hidden; }
      /* eframe's resize observer drives the framebuffer; CSS fills the viewport. */
      canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
      #loading {
        position: absolute; inset: 0; display: grid; place-items: center;
        color: #9a9aa2; font: 14px system-ui, sans-serif;
      }
      /* A small toolbar over the canvas: open a file, capture the focused track
         to the OPFS corpus, and fold the corpus into a manifest. */
      #bar { position: absolute; z-index: 1; top: 8px; left: 8px; display: flex; gap: 6px; }
      #bar > * {
        padding: 4px 10px; border: 0; border-radius: 6px; cursor: pointer; user-select: none;
        background: #2a2a30cc; color: #d6d6dd; font: 15px system-ui, sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="loading">loading the cockpit…</div>
    <div id="bar">
      <label id="open" title="open a MIDI or Guitar Pro file">📂 Open<input
          id="file" type="file" accept=".mid,.gp3,.gp4,.gp5,.gpx" hidden /></label>
      <button id="capture" title="capture the focused track as chunk.json">⤓ Capture</button>
      <button id="manifest" title="fold the OPFS corpus into a manifest.json">📦 Manifest</button>
    </div>
    <canvas id="cockpit"></canvas>
    <script type="module">
      // `wasm-bindgen --target web` emits griff_cockpit.js (the loader) and the
      // wasm; boot the egui app on the canvas and wire the toolbar to the wasm
      // exports (ADR-0027 Slices 2–4).
      import init, { start, load_score, request_capture, build_manifest_json }
        from "./griff_cockpit.js";

      function download(name, text) {
        const url = URL.createObjectURL(new Blob([text], { type: "application/json" }));
        const a = document.createElement("a");
        a.href = url;
        a.download = name;
        a.click();
        URL.revokeObjectURL(url);
      }

      // Read every chunk.json from the OPFS corpus and fold it, in-wasm, into a
      // manifest (the schema lives in Rust; JS just gathers the bytes).
      async function buildManifest() {
        const texts = [];
        try {
          const root = await navigator.storage.getDirectory();
          const corpus = await root.getDirectoryHandle("corpus");
          for await (const [name, handle] of corpus.entries()) {
            if (name.endsWith(".chunk.json")) texts.push(await (await handle.getFile()).text());
          }
        } catch (_) {
          /* no corpus yet */
        }
        try {
          download("manifest.json", build_manifest_json(texts));
        } catch (err) {
          console.error("manifest failed:", err);
        }
      }

      init()
        .then(() => {
          document.getElementById("loading").remove();
          start(document.getElementById("cockpit"));
          document.getElementById("file").addEventListener("change", async (event) => {
            const file = event.target.files[0];
            if (file) load_score(file.name, new Uint8Array(await file.arrayBuffer()));
          });
          document.getElementById("capture").addEventListener("click", () => request_capture());
          document.getElementById("manifest").addEventListener("click", buildManifest);
        })
        .catch((err) => {
          document.getElementById("loading").textContent =
            "failed to load the cockpit — see the console";
          console.error(err);
        });
    </script>
  </body>
</html>
