name: web-playground

# Builds the WASM playground (web/) and deploys it to GitHub Pages.
# Enable once under repo Settings → Pages → Source: "GitHub Actions".

on:
  push:
    branches: [main]
    paths: ['web/**', 'core/**', '.github/workflows/web.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            web/target
          key: web-wasm-${{ hashFiles('web/Cargo.toml', 'core/Cargo.toml') }}
      - name: Build playground
        run: ./web/build.sh
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
